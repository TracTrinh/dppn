  <h1>Goṇagāmaka <span class="status">untranslated</span></h1>
  
    <section id="entry" class="sense">
      
      
      <div class="entry-body">
        <div class="lang-block lang-en" lang="en">
          <p>Goṇagāmaka. A landing-place (<em>paṭṭana</em>) at the mouth of the <a class="dppn-term-link dppn-term-t14" href="../../m/maha-kandara/index.html">Mahā Kandara</a> river, where <a class="dppn-term-link dppn-term-t14" href="../../b/bhaddakaccana/index.html">Bhaddakaccānā</a> and her companions disembarked. Mhv.viii.25; cf.v.12.</p>
        </div>
        <div class="lang-block lang-vi" lang="vi">
          <div class="translation-missing"><p>Chưa dịch.</p></div>
        </div>
      </div>
